name: Backend CI

# PR ve main'e push'ta derleme + paketleme kapısı. (Tek mevcut test bağlam-yükleme
# olduğundan ve canlı Postgres/Keycloak gerektirdiğinden CI'da -DskipTests ile
# çalışır; amaç bozuk kodun main'e/deploy'a ulaşmasını engellemek.)
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build (package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build
        run: ./mvnw -B -ntp -DskipTests package
