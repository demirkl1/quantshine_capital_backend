spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quantshine_database}
spring.datasource.username=${DB_USERNAME:postgres}
# Secret — fallback YOK. Lokal geliştirme için: SPRING_PROFILES_ACTIVE=local
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
server.port=8081
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:${KEYCLOAK_URL:http://localhost:9090}/realms/${KEYCLOAK_REALM:quantshine}}
keycloak.realm=${KEYCLOAK_REALM:quantshine}
keycloak.auth-server-url=${KEYCLOAK_URL:http://localhost:9090}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:quantshine-backend}
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM:master}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
# Secret — fallback YOK.
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}
# Secret — fallback YOK. Bu değerler şifrelenmiş verinin (geçici parola) anahtarıdır.
encryption.secret=${ENCRYPTION_SECRET}
encryption.salt=${ENCRYPTION_SALT}
app.scheduling.enabled=true
# Auth cookie'leri yalnızca HTTPS üzerinden gönderilsin (prod). Lokal http için
# application-local.properties bunu false yapar.
app.cookie.secure=true
spring.jpa.open-in-view=false
# Secret — fallback YOK. Sızdırılan eski anahtarlar iptal edilmeli.
finnhub.api.key=${FINNHUB_API_KEY}
newsapi.key=${NEWSAPI_KEY}

# ── E-posta / iletişim formu ──────────────────────────────────────────────
# Gmail SMTP. MAIL_USERNAME = gönderen Gmail adresi, MAIL_PASSWORD = 16 haneli
# Gmail App Password (normal şifre DEĞİL). Boşken iletişim formu 503 döner;
# .env'e doldurulup backend restart edilince aktifleşir.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Mesajların düşeceği adres + gönderen (from). from boşsa MAIL_USERNAME kullanılır.
contact.to=${CONTACT_TO:dkilic6606@gmail.com}
contact.from=${CONTACT_FROM:${MAIL_USERNAME:}}

# ── Actuator (sağlık) ─────────────────────────────────────────────────────
# Yalnızca /actuator/health açık; detaylar gizli (bilgi sızıntısı önlenir).
# Liveness/readiness probe'ları docker/orchestration için aktif.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ── HikariCP Connection Pool ──────────────────────────────────────────────────
# 20 concurrent DB bağlantısı; API sunucusu + zamanlayıcılar için yeterli
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true
# PostgreSQL prepared statement cache'i (bağlantı başına 250 sorgu)
spring.datasource.hikari.data-source-properties.preparedStatementCacheSize=250
spring.datasource.hikari.data-source-properties.preparedStatementCacheSqlLimit=2048

# ── Hibernate Batch / Fetch Ayarları ─────────────────────────────────────────
# Toplu INSERT/UPDATE → N ayrı sorgu yerine tek round-trip
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Sonuç seti ön yükleme boyutu (JDBC cursor buffer)
spring.jpa.properties.hibernate.jdbc.fetch_size=50
# Lazy koleksiyonlar için batch fetch (N+1'i toplu hale getirir)
spring.jpa.properties.hibernate.default_batch_fetch_size=10
# IN koşulunda parametre padding — query plan cache isabet oranını artırır
spring.jpa.properties.hibernate.in_clause_parameter_padding=true
