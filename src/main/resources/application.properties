spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quantshine_database}
spring.datasource.username=${DB_USERNAME:postgres}
# Secret — fallback YOK. Lokal geliştirme için: SPRING_PROFILES_ACTIVE=local
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
server.port=8081
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true
# Issuer artık env ile gelir (prod'da KEYCLOAK_ISSUER_URI). Önceden localhost'a sabitti.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/quantshine}
keycloak.realm=${KEYCLOAK_REALM:quantshine}
keycloak.auth-server-url=${KEYCLOAK_URL:http://localhost:9090}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:quantshine-backend}
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM:master}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
# Secret — fallback YOK.
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}
# Secret — fallback YOK. Bu değerler şifrelenmiş verinin (geçici parola) anahtarıdır.
encryption.secret=${ENCRYPTION_SECRET}
encryption.salt=${ENCRYPTION_SALT}
app.scheduling.enabled=true
spring.jpa.open-in-view=false
# Secret — fallback YOK. Sızdırılan eski anahtar iptal edilmeli.
finnhub.api.key=${FINNHUB_API_KEY}
